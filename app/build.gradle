plugins {
    id "com.android.application"
}

android {
    namespace "com.codex.rearscreenfix"
    compileSdk 35

    defaultConfig {
        applicationId "com.codex.rearscreenfix"
        minSdk 29
        targetSdk 35
        versionCode 5
        versionName "0.1.3"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly files("libs/api-82.jar")
}
